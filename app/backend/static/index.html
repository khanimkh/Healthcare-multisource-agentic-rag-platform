<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Healthcare RAG Assistant</title>
<style>
  :root {
    color-scheme: light dark;
    --accent: #2563eb;
    --accent-soft: color-mix(in srgb, var(--accent) 15%, transparent);
    --border: color-mix(in srgb, currentColor 15%, transparent);
    --surface: color-mix(in srgb, currentColor 5%, transparent);
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    max-width: 820px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
    line-height: 1.5;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    gap: 1rem;
  }
  h1 { font-size: 1.3rem; margin: 0; }
  .subtitle { margin: .2rem 0 0; font-size: .85rem; opacity: .65; }

  button { font: inherit; cursor: pointer; }
  button.ghost {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: .4rem .9rem;
    font-size: .8rem;
    color: inherit;
    white-space: nowrap;
  }
  button.ghost:hover { background: var(--surface); }
  button.primary {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 1.2rem;
    font-weight: 600;
  }
  button.primary:disabled { opacity: .5; cursor: default; }

  .tabs {
    display: flex;
    gap: .4rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    padding: .6rem .3rem;
    font-size: .92rem;
    font-weight: 600;
    color: inherit;
    opacity: .55;
    margin-bottom: -1px;
  }
  .tab-btn.active { opacity: 1; border-bottom-color: var(--accent); color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  section.card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  section.card > h2 {
    font-size: .95rem;
    margin: 0;
    padding: .9rem 1.1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  #chat {
    min-height: 120px;
    max-height: 480px;
    overflow-y: auto;
    padding: 1rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: .9rem;
  }
  #chat:empty::before {
    content: "Ask a question below to get started.";
    opacity: .5;
    font-size: .9rem;
  }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 85%;
    padding: .6rem .85rem;
    border-radius: 14px;
    font-size: .92rem;
  }
  .msg.user .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble, .msg.error .bubble { background: var(--surface); border-bottom-left-radius: 4px; }
  .msg.error .bubble { color: crimson; }

  /* rendered markdown inside assistant bubbles */
  .bubble h1, .bubble h2, .bubble h3 { margin: .6rem 0 .3rem; line-height: 1.25; }
  .bubble h1 { font-size: 1.05rem; }
  .bubble h2 { font-size: 1rem; }
  .bubble h3 { font-size: .95rem; }
  .bubble p { margin: .4rem 0; }
  .bubble ul, .bubble ol { margin: .4rem 0; padding-left: 1.3rem; }
  .bubble li { margin: .15rem 0; }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: .6rem 0; }
  .bubble code {
    background: color-mix(in srgb, currentColor 10%, transparent);
    padding: .05rem .3rem;
    border-radius: 4px;
    font-size: .85em;
  }
  .bubble pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: color-mix(in srgb, currentColor 8%, transparent);
    padding: .5rem .6rem;
    border-radius: 6px;
    font-size: .82rem;
    margin: .5rem 0;
  }
  .bubble pre code { background: none; padding: 0; }

  .route-badge {
    display: inline-block;
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .03em;
    padding: .1rem .5rem;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    margin-bottom: .35rem;
  }
  .sources { margin: .5rem 0 0; padding-left: 1.1rem; font-size: .8rem; opacity: .8; }

  .input-row {
    display: flex;
    gap: .5rem;
    padding: .8rem 1.1rem;
    border-top: 1px solid var(--border);
  }
  textarea#question {
    flex: 1;
    resize: none;
    font: inherit;
    padding: .6rem .75rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: inherit;
    max-height: 8rem;
  }

  .dropzone {
    display: block;
    margin: 1.1rem;
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 1.5rem 1rem;
    text-align: center;
    font-size: .88rem;
    opacity: .8;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .dropzone.drag-over { background: var(--accent-soft); border-color: var(--accent); opacity: 1; }
  .dropzone input { display: none; }
  #upload-result { padding: 0 1.1rem; font-size: .85rem; }
  .upload-item { padding: .8rem 0; border-bottom: 1px solid var(--border); }
  .upload-item:last-child { border-bottom: none; }
  .result-grid { display: grid; grid-template-columns: auto 1fr; gap: .3rem .8rem; margin-top: .6rem; }
  .result-grid dt { opacity: .6; }
  .result-grid dd { margin: 0; word-break: break-word; }

  .table-wrap { overflow-x: auto; margin-top: .5rem; border: 1px solid var(--border); border-radius: 6px; }
  .preview-table { border-collapse: collapse; font-size: .78rem; white-space: nowrap; width: 100%; }
  .preview-table th, .preview-table td { padding: .35rem .55rem; border-bottom: 1px solid var(--border); text-align: left; }
  .preview-table th { background: var(--surface); }
  .preview-table tr:last-child td { border-bottom: none; }

  .doc-list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .9rem 1.1rem .5rem;
  }
  .doc-list-header h3 { margin: 0; font-size: .85rem; opacity: .7; text-transform: uppercase; letter-spacing: .03em; }
  #document-list { padding: 0 1.1rem 1.1rem; display: flex; flex-direction: column; gap: .5rem; }
  #document-list:empty::before { content: "No documents uploaded yet."; opacity: .5; font-size: .85rem; }
  .doc-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    padding: .55rem .7rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .85rem;
  }
  .doc-row .doc-name { font-weight: 600; }
  .doc-row .doc-type { opacity: .6; font-size: .78rem; }
  .doc-actions { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
  .delete-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .2rem .55rem;
    font-size: .72rem;
    color: crimson;
  }
  .delete-btn:hover { background: color-mix(in srgb, crimson 12%, transparent); }
  .delete-btn:disabled { opacity: .5; cursor: default; }
  .status-badge {
    display: inline-block;
    padding: .15rem .55rem;
    border-radius: 999px;
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .02em;
    white-space: nowrap;
  }
  .status-uploaded, .status-processing { background: color-mix(in srgb, orange 25%, transparent); color: chocolate; }
  .status-indexed, .status-registered { background: color-mix(in srgb, seagreen 25%, transparent); color: seagreen; }
  .status-failed { background: color-mix(in srgb, crimson 20%, transparent); color: crimson; }

  .chart-title { font-size: .8rem; opacity: .7; margin: 1rem 0 .4rem; text-transform: uppercase; letter-spacing: .03em; }
  .chart-title:first-child { margin-top: 0; }

  .insights-explore { padding: 1rem 1.1rem; }
  .insights-explore select, .insights-explore input[type="text"] {
    font: inherit;
    padding: .55rem .7rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: inherit;
  }
  .chart-controls-row { display: flex; gap: .5rem; margin-bottom: .5rem; }
  .chart-controls-row select { flex: 1; min-width: 0; }
  .chart-query-row { display: flex; gap: .5rem; }
  .chart-query-row input[type="text"] { flex: 1; }
  #chart-result { margin-top: .9rem; }
  .chart-legend { display: flex; flex-direction: column; justify-content: center; gap: .2rem; }
  .chart-legend-row { display: flex; align-items: center; gap: .4rem; font-size: .78rem; }
  .chart-legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid color-mix(in srgb, currentColor 25%, transparent);
    border-top-color: currentColor;
    border-radius: 50%;
    display: inline-block;
    animation: spin .7s linear infinite;
    vertical-align: -2px;
    margin-right: .4rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <header>
    <div>
      <h1>Healthcare Multi-Source RAG Assistant</h1>
      <p class="subtitle">Ask questions across documents, structured data, and knowledge graphs</p>
    </div>
    <button class="ghost" id="new-chat-btn" type="button">New chat</button>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" id="tab-btn-ask" data-tab="ask" type="button">Ask</button>
    <button class="tab-btn" id="tab-btn-upload" data-tab="upload" type="button">Upload</button>
    <button class="tab-btn" id="tab-btn-insights" data-tab="insights" type="button">Insights</button>
  </nav>

  <section id="panel-ask" class="tab-panel card active">
    <h2>Ask a question</h2>
    <div id="chat"></div>
    <div class="input-row">
      <textarea id="question" rows="1" placeholder="Ask about uploaded documents or data… (Enter to send, Shift+Enter for a new line)"></textarea>
      <button class="primary" id="ask-btn" type="button">Send</button>
    </div>
  </section>

  <section id="panel-upload" class="tab-panel card">
    <h2>Upload documents or datasets</h2>
    <label class="dropzone" id="dropzone">
      <span id="dropzone-label">Drag files here, or click to choose (multiple allowed)</span>
      <input type="file" id="file-input" multiple>
    </label>
    <div id="upload-result"></div>

    <div class="doc-list-header">
      <h3>Uploaded documents</h3>
      <button class="ghost" id="refresh-docs-btn" type="button">Refresh</button>
    </div>
    <div id="document-list"></div>
  </section>

  <section id="panel-insights" class="tab-panel card">
    <h2>Document insights</h2>

    <div class="insights-explore">
      <h3 class="chart-title">Explore your data</h3>
      <div class="chart-controls-row">
        <select id="chart-suggestions">
          <option value="">Loading suggestions…</option>
        </select>
        <select id="chart-type-select">
          <option value="bar">Bar chart</option>
          <option value="pie">Pie chart</option>
          <option value="line">Line chart</option>
        </select>
      </div>
      <div class="chart-query-row">
        <input type="text" id="chart-question-input" placeholder="e.g. Number of patients by diagnosis">
        <button class="primary" id="generate-chart-btn" type="button">Generate chart</button>
      </div>
      <div id="chart-result"></div>
    </div>
  </section>

<script>
  const sessionId = localStorage.getItem('session_id') || crypto.randomUUID();
  localStorage.setItem('session_id', sessionId);

  function escapeHtml(text) {
    return String(text ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ---- Minimal Markdown renderer (headers, bold/italic, lists, code, hr, paragraphs) ----
  function renderMarkdown(text) {
    let html = escapeHtml(text);

    html = html.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${code}</code></pre>`);
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    html = html.replace(/^###\s+(.*)$/gm, '<h3>$1</h3>');
    html = html.replace(/^##\s+(.*)$/gm, '<h2>$1</h2>');
    html = html.replace(/^#\s+(.*)$/gm, '<h1>$1</h1>');

    html = html.replace(/^-{3,}$/gm, '<hr>');

    html = html.replace(/(^|\n)((?:[-*]\s+.*(?:\n|$))+)/g, (match, lead, block) => {
      const items = block.trim().split('\n').map(line => `<li>${line.replace(/^[-*]\s+/, '')}</li>`).join('');
      return `${lead}<ul>${items}</ul>`;
    });
    html = html.replace(/(^|\n)((?:\d+\.\s+.*(?:\n|$))+)/g, (match, lead, block) => {
      const items = block.trim().split('\n').map(line => `<li>${line.replace(/^\d+\.\s+/, '')}</li>`).join('');
      return `${lead}<ol>${items}</ol>`;
    });

    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');

    html = html.split(/\n{2,}/).map(block => {
      const trimmed = block.trim();
      if (!trimmed) return '';
      if (/^<(h1|h2|h3|ul|ol|pre|hr)/.test(trimmed)) return trimmed;
      return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
    }).join('');

    return html;
  }

  // ---- Tabs ----
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
      if (btn.dataset.tab === 'upload') loadDocuments();
      if (btn.dataset.tab === 'insights') loadChartSuggestions();
    });
  });

  // ---- Chat ----
  const chat = document.getElementById('chat');
  const questionInput = document.getElementById('question');
  const askBtn = document.getElementById('ask-btn');

  function addMessage(role, html) {
    const row = document.createElement('div');
    row.className = `msg ${role}`;
    row.innerHTML = `<div class="bubble">${html}</div>`;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return row;
  }

  function autoGrow() {
    questionInput.style.height = 'auto';
    questionInput.style.height = Math.min(questionInput.scrollHeight, 128) + 'px';
  }
  questionInput.addEventListener('input', autoGrow);

  questionInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      askBtn.click();
    }
  });

  askBtn.addEventListener('click', async () => {
    const question = questionInput.value.trim();
    if (!question) return;

    addMessage('user', escapeHtml(question));
    questionInput.value = '';
    autoGrow();

    askBtn.disabled = true;
    const pending = addMessage('assistant', '<span class="spinner"></span>Thinking…');

    try {
      const response = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, session_id: sessionId })
      });

      const data = await response.json();

      if (!response.ok) {
        pending.className = 'msg error';
        pending.innerHTML = `<div class="bubble">${escapeHtml(data.detail || 'Request failed')}</div>`;
        return;
      }

      let html = '';
      if (data.route) html += `<span class="route-badge">${escapeHtml(data.route)}</span><br>`;
      html += renderMarkdown(data.answer);
      if (data.sql) html += `<pre><code>${escapeHtml(data.sql)}</code></pre>`;
      if (data.sources && data.sources.length) {
        html += '<ul class="sources">' +
          data.sources.map(s => `<li>${escapeHtml(s.file_name || s.s3_uri || JSON.stringify(s))}</li>`).join('') +
          '</ul>';
      }
      pending.innerHTML = `<div class="bubble">${html}</div>`;
    } catch (err) {
      pending.className = 'msg error';
      pending.innerHTML = `<div class="bubble">${escapeHtml(err.message)}</div>`;
    } finally {
      askBtn.disabled = false;
      questionInput.focus();
    }
  });

  document.getElementById('new-chat-btn').addEventListener('click', () => {
    localStorage.removeItem('session_id');
    location.reload();
  });

  // ---- Upload ----
  const dropzone = document.getElementById('dropzone');
  const dropzoneLabel = document.getElementById('dropzone-label');
  const fileInput = document.getElementById('file-input');
  const uploadResult = document.getElementById('upload-result');

  ['dragover', 'dragenter'].forEach(evt =>
    dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); })
  );
  ['dragleave', 'dragend', 'drop'].forEach(evt =>
    dropzone.addEventListener(evt, () => dropzone.classList.remove('drag-over'))
  );
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    if (e.dataTransfer.files.length) {
      fileInput.files = e.dataTransfer.files;
      uploadFiles(e.dataTransfer.files);
    }
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) uploadFiles(fileInput.files);
  });

  function renderUploadResult(data) {
    const hasPreview = data.sample_rows && data.sample_rows.length;
    const skipKeys = new Set(hasPreview ? ['sample_rows', 'columns'] : ['sample_rows']);

    const gridRows = Object.entries(data)
      .filter(([k, v]) => !skipKeys.has(k) && v !== null && v !== undefined)
      .map(([k, v]) => `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(Array.isArray(v) ? v.join(', ') : v)}</dd>`)
      .join('');

    let html = `<p>✅ Uploaded successfully</p><dl class="result-grid">${gridRows}</dl>`;

    if (hasPreview) {
      const columns = data.columns || Object.keys(data.sample_rows[0]);
      const headerHtml = columns.map(c => `<th>${escapeHtml(c)}</th>`).join('');
      const bodyHtml = data.sample_rows.map(row =>
        `<tr>${columns.map(c => `<td>${escapeHtml(row[c])}</td>`).join('')}</tr>`
      ).join('');

      html += `
        <p class="muted" style="margin-top:.75rem">Preview (first ${data.sample_rows.length} rows):</p>
        <div class="table-wrap"><table class="preview-table"><thead><tr>${headerHtml}</tr></thead><tbody>${bodyHtml}</tbody></table></div>
      `;
    }

    return html;
  }

  async function uploadFiles(fileList) {
    const files = Array.from(fileList);
    if (!files.length) return;

    dropzoneLabel.textContent = files.length === 1 ? files[0].name : `${files.length} files selected`;
    uploadResult.innerHTML = '';

    for (const file of files) {
      await uploadFile(file);
    }

    fileInput.value = '';
    loadDocuments();
  }

  async function uploadFile(file) {
    const block = document.createElement('div');
    block.className = 'upload-item';
    block.innerHTML = `<p><span class="spinner"></span>Uploading ${escapeHtml(file.name)}…</p>`;
    uploadResult.appendChild(block);

    const formData = new FormData();
    formData.append('file', file);

    try {
      const response = await fetch('/upload', { method: 'POST', body: formData });
      const data = await response.json();

      if (!response.ok) {
        block.innerHTML = `<p style="color:crimson">${escapeHtml(file.name)}: ${escapeHtml(data.detail || 'Upload failed')}</p>`;
        return;
      }

      block.innerHTML = renderUploadResult(data);
    } catch (err) {
      block.innerHTML = `<p style="color:crimson">${escapeHtml(file.name)}: ${escapeHtml(err.message)}</p>`;
    }
  }

  // ---- Document list ----
  const documentList = document.getElementById('document-list');
  const refreshDocsBtn = document.getElementById('refresh-docs-btn');

  function formatTimestamp(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleString();
    } catch {
      return iso;
    }
  }

  async function loadDocuments() {
    documentList.innerHTML = '<p class="muted"><span class="spinner"></span>Loading…</p>';

    try {
      const response = await fetch('/documents');
      const docs = await response.json();

      if (!response.ok) {
        documentList.innerHTML = `<p style="color:crimson">${escapeHtml(docs.detail || 'Failed to load documents')}</p>`;
        return;
      }

      if (!docs.length) {
        documentList.innerHTML = '';
        return;
      }

      documentList.innerHTML = docs.map(d => `
        <div class="doc-row">
          <div>
            <div class="doc-name">${escapeHtml(d.file_name)}</div>
            <div class="doc-type">${escapeHtml(d.document_type || 'unclassified')} · ${escapeHtml(formatTimestamp(d.uploaded_at))}</div>
          </div>
          <div class="doc-actions">
            <span class="status-badge status-${escapeHtml(d.status)}">${escapeHtml(d.status)}</span>
            <button class="delete-btn" type="button" title="Delete" data-file-id="${escapeHtml(d.file_id)}" data-file-name="${escapeHtml(d.file_name)}">Delete</button>
          </div>
        </div>
      `).join('');
    } catch (err) {
      documentList.innerHTML = `<p style="color:crimson">${escapeHtml(err.message)}</p>`;
    }
  }

  documentList.addEventListener('click', async (e) => {
    const btn = e.target.closest('.delete-btn');
    if (!btn) return;

    const fileId = btn.dataset.fileId;
    const fileName = btn.dataset.fileName;
    if (!confirm(`Delete "${fileName}"? This removes it from storage and search, and can't be undone.`)) return;

    btn.disabled = true;
    btn.textContent = 'Deleting…';

    try {
      const response = await fetch(`/documents/${encodeURIComponent(fileId)}`, { method: 'DELETE' });
      const data = await response.json();

      if (!response.ok) {
        alert(data.detail || 'Delete failed');
        btn.disabled = false;
        btn.textContent = 'Delete';
        return;
      }

      loadDocuments();
    } catch (err) {
      alert(err.message);
      btn.disabled = false;
      btn.textContent = 'Delete';
    }
  });

  refreshDocsBtn.addEventListener('click', loadDocuments);

  // ---- Chart explorer (dependency-free inline SVG bar/pie/line charts) ----
  const CHART_COLORS = ['#2563eb', '#16a34a', '#f59e0b', '#dc2626', '#7c3aed', '#0891b2', '#db2777', '#65a30d'];

  function truncateLabel(label, max = 12) {
    return String(label).length > max ? String(label).slice(0, max - 1) + '…' : label;
  }

  function renderYAxisTitle(label, paddingLeft, paddingTop, chartHeight) {
    if (!label) return '';
    const cy = paddingTop + chartHeight / 2;
    return `<text x="10" y="${cy}" font-size="9" fill="currentColor" text-anchor="middle" transform="rotate(-90 10 ${cy})">${escapeHtml(label)}</text>`;
  }

  function renderBarChart(data, { width = 360, height = 190, color = 'var(--accent)', yAxisLabel = 'Value' } = {}) {
    if (!data.length) return '<p class="muted">No data yet.</p>';

    const max = Math.max(...data.map(d => d.value), 1);
    const gap = 8;
    const paddingTop = 20;
    const paddingBottom = 34;
    const paddingLeft = yAxisLabel ? 26 : 6;
    const chartHeight = height - paddingTop - paddingBottom;
    const chartWidth = width - paddingLeft - 6;
    const barWidth = (chartWidth - gap * (data.length - 1)) / data.length;

    const bars = data.map((d, i) => {
      const barHeight = (d.value / max) * chartHeight;
      const x = paddingLeft + i * (barWidth + gap);
      const y = paddingTop + (chartHeight - barHeight);

      return `
        <text x="${x + barWidth / 2}" y="${y - 4}" font-size="10" text-anchor="middle" fill="currentColor">${d.value}</text>
        <rect x="${x}" y="${y}" width="${barWidth}" height="${Math.max(barHeight, 1)}" fill="${color}" rx="3"></rect>
        <text x="${x + barWidth / 2}" y="${paddingTop + chartHeight + 14}" font-size="9" text-anchor="middle" fill="currentColor">${escapeHtml(truncateLabel(d.label))}</text>
      `;
    }).join('');

    const axis = `<line x1="${paddingLeft}" y1="${paddingTop}" x2="${paddingLeft}" y2="${paddingTop + chartHeight}" stroke="currentColor" stroke-opacity=".3"></line>`;

    return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;max-width:${width}px;height:auto">${axis}${renderYAxisTitle(yAxisLabel, paddingLeft, paddingTop, chartHeight)}${bars}</svg>`;
  }

  function renderLineChart(data, { width = 360, height = 190, color = 'var(--accent)', yAxisLabel = 'Value' } = {}) {
    if (!data.length) return '<p class="muted">No data yet.</p>';

    const max = Math.max(...data.map(d => d.value), 1);
    const paddingTop = 20;
    const paddingBottom = 34;
    const paddingLeft = yAxisLabel ? 26 : 6;
    const chartHeight = height - paddingTop - paddingBottom;
    const chartWidth = width - paddingLeft - 6;
    const stepX = data.length > 1 ? chartWidth / (data.length - 1) : 0;

    const points = data.map((d, i) => ({
      x: paddingLeft + i * stepX,
      y: paddingTop + chartHeight - (d.value / max) * chartHeight,
      d
    }));

    const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');

    const dots = points.map(p => `
      <text x="${p.x}" y="${p.y - 8}" font-size="10" text-anchor="middle" fill="currentColor">${p.d.value}</text>
      <circle cx="${p.x}" cy="${p.y}" r="3.5" fill="${color}"></circle>
      <text x="${p.x}" y="${paddingTop + chartHeight + 14}" font-size="9" text-anchor="middle" fill="currentColor">${escapeHtml(truncateLabel(p.d.label))}</text>
    `).join('');

    const axis = `<line x1="${paddingLeft}" y1="${paddingTop}" x2="${paddingLeft}" y2="${paddingTop + chartHeight}" stroke="currentColor" stroke-opacity=".3"></line>`;

    return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;max-width:${width}px;height:auto">
      ${axis}${renderYAxisTitle(yAxisLabel, paddingLeft, paddingTop, chartHeight)}
      <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2"></path>
      ${dots}
    </svg>`;
  }

  function renderPieChart(data, { size = 200 } = {}) {
    if (!data.length) return '<p class="muted">No data yet.</p>';

    const total = data.reduce((sum, d) => sum + d.value, 0) || 1;
    const radius = size / 2 - 14;
    const center = size / 2;
    const circumference = 2 * Math.PI * radius;

    let offset = 0;
    const segments = data.map((d, i) => {
      const fraction = d.value / total;
      const dash = fraction * circumference;
      const circle = `<circle cx="${center}" cy="${center}" r="${radius}" fill="none" stroke="${CHART_COLORS[i % CHART_COLORS.length]}" stroke-width="26" stroke-dasharray="${dash} ${circumference - dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${center} ${center})"></circle>`;
      offset += dash;
      return circle;
    }).join('');

    const legend = data.map((d, i) => `
      <div class="chart-legend-row">
        <span class="chart-legend-swatch" style="background:${CHART_COLORS[i % CHART_COLORS.length]}"></span>
        ${escapeHtml(truncateLabel(d.label, 24))} — ${d.value} (${Math.round(d.value / total * 100)}%)
      </div>
    `).join('');

    return `
      <div style="display:flex;gap:1.2rem;align-items:center;flex-wrap:wrap">
        <svg viewBox="0 0 ${size} ${size}" style="width:${size}px;max-width:100%;height:auto;flex-shrink:0">${segments}</svg>
        <div class="chart-legend">${legend}</div>
      </div>
    `;
  }

  function renderChart(data, type, opts = {}) {
    if (type === 'pie') return renderPieChart(data, opts);
    if (type === 'line') return renderLineChart(data, opts);
    return renderBarChart(data, opts);
  }

  // ---- Chart explorer (ask a question about your data, get a chart) ----
  const chartSuggestionsSelect = document.getElementById('chart-suggestions');
  const chartTypeSelect = document.getElementById('chart-type-select');
  const chartQuestionInput = document.getElementById('chart-question-input');
  const generateChartBtn = document.getElementById('generate-chart-btn');
  const chartResult = document.getElementById('chart-result');
  let lastChartResult = null;

  async function loadChartSuggestions() {
    chartSuggestionsSelect.innerHTML = '<option value="">Loading suggestions…</option>';

    try {
      const response = await fetch('/visualizations/suggestions');
      const data = await response.json();

      if (!response.ok || !data.questions || !data.questions.length) {
        chartSuggestionsSelect.innerHTML = '<option value="">No suggestions yet — upload structured data first</option>';
        return;
      }

      chartSuggestionsSelect.innerHTML = '<option value="">Choose a suggested question…</option>' +
        data.questions.map(q => `<option value="${escapeHtml(q)}">${escapeHtml(q)}</option>`).join('');
    } catch (err) {
      chartSuggestionsSelect.innerHTML = '<option value="">Failed to load suggestions</option>';
    }
  }

  chartSuggestionsSelect.addEventListener('change', () => {
    if (chartSuggestionsSelect.value) {
      chartQuestionInput.value = chartSuggestionsSelect.value;
      generateChart(chartSuggestionsSelect.value);
    }
  });

  generateChartBtn.addEventListener('click', () => {
    const question = chartQuestionInput.value.trim();
    if (question) generateChart(question);
  });

  chartQuestionInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      generateChartBtn.click();
    }
  });

  chartTypeSelect.addEventListener('change', () => {
    if (lastChartResult) renderChartResult();
  });

  function renderChartResult() {
    if (!lastChartResult || !lastChartResult.labels || !lastChartResult.labels.length) {
      chartResult.innerHTML = '<p class="muted">No data found for that question.</p>';
      return;
    }

    const chartData = lastChartResult.labels.map((label, i) => ({ label, value: lastChartResult.values[i] }));

    chartResult.innerHTML = `
      <h3 class="chart-title">${escapeHtml(lastChartResult.title)}</h3>
      ${renderChart(chartData, chartTypeSelect.value, { color: 'darkorange' })}
      ${lastChartResult.sql ? `<pre><code>${escapeHtml(lastChartResult.sql)}</code></pre>` : ''}
    `;
  }

  async function generateChart(question) {
    generateChartBtn.disabled = true;
    chartResult.innerHTML = '<p class="muted"><span class="spinner"></span>Generating chart…</p>';

    try {
      const response = await fetch('/visualizations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      const data = await response.json();

      if (!response.ok) {
        lastChartResult = null;
        chartResult.innerHTML = `<p style="color:crimson">${escapeHtml(data.detail || 'Failed to generate chart')}</p>`;
        return;
      }

      lastChartResult = data;
      renderChartResult();
    } catch (err) {
      lastChartResult = null;
      chartResult.innerHTML = `<p style="color:crimson">${escapeHtml(err.message)}</p>`;
    } finally {
      generateChartBtn.disabled = false;
    }
  }
</script>
</body>
</html>
